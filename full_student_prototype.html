<!DOCTYPE html>
<html lang="en" dir="ltr" class="h-full bg-slate-100 antialiased" x-data="{ 
    darkMode: localStorage.getItem('theme') === 'dark'
}" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNex - Dashboard (Index)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Elegant San-Serif Font mimicking the image -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#14b8a6', // Neon Teal / Cyan accent
                        secondary: '#4f46e5', // Indigo
                        dark_bg: '#0a0f1c', // Very deep navy
                        dark_card: '#111827',
                        navy_gradient: {
                            start: '#1e1b4b',
                            end: '#0f172a'
                        },
                        recom_purple: '#e0e7ff',
                        recom_purple_dark: '#1e1b4b',
                    },
                    borderRadius: {
                        '3xl': '1.75rem',
                        '4xl': '2rem',
                    },
                    boxShadow: {
                        'soft': '0 8px 30px -4px rgba(0,0,0,0.06)',
                        'glow': '0 0 15px rgba(20, 184, 166, 0.4)',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Mobile App Viewport simulation */
        .app-container {
            width: 100%;
            max-width: 414px; /* iPhone Max Width */
            margin: 0 auto;
            position: relative;
            background-color: #f8fafc; /* Very soft slate-50 */
            min-height: 100vh;
            overflow-x: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }
        .dark .app-container {
            background-color: #020617; /* Deepest slate 950 */
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* Glassmorphism / Component Styling */
        .stat-card {
            @apply bg-white dark:bg-[#0f172a] rounded-[1.25rem] py-3 text-center border border-transparent dark:border-white/5 shadow-soft dark:shadow-none transition-all duration-300;
        }

        .dark-ongoing-card {
            background: linear-gradient(135deg, #1e1b4b, #0f172a);
            position: relative;
            overflow: hidden;
        }

        .bottom-nav-fixed {
             @apply fixed bottom-0 max-w-[414px] w-full bg-white/95 dark:bg-[#0f172a]/95 backdrop-blur-xl border-t border-slate-100 dark:border-white/5 px-6 pt-3 pb-8 flex items-center justify-between z-50 rounded-t-3xl;
        }

        .nav-item {
             @apply flex flex-col items-center gap-1.5 text-[9px] font-bold text-slate-400 dark:text-slate-500 transition-colors uppercase tracking-widest;
        }
        .nav-item.active { @apply text-primary; }
        
        /* Theme Toggle (Outside App) */
        .theme-float {
            position: fixed; top: 1rem; right: 1rem;
            @apply bg-white dark:bg-slate-800 p-3 rounded-full shadow-lg border border-slate-200 dark:border-white/10 z-[1000] cursor-pointer hover:bg-slate-50 transition-all;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="transition-colors duration-300">

    <!-- Global Theme Switch (Floating outside the app simulator) -->
    <button @click="darkMode = !darkMode; localStorage.setItem('theme', darkMode ? 'dark' : 'light')" class="theme-float">
        <svg x-show="!darkMode" class="w-6 h-6 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        <svg x-show="darkMode" class="w-6 h-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
    </button>

    <!-- App Simulator Wrapper -->
    <div class="h-screen w-full flex items-center justify-center dark:bg-black bg-slate-200 lg:py-4">
        
        <div class="app-container relative lg:rounded-[2.5rem] lg:border-8 border-slate-800 dark:border-slate-800">

            <!-- --- DASHBOARD INDEX CONTENT --- -->
            <div class="pb-[100px] bg-slate-50 dark:bg-transparent min-h-full">
                
                <!-- 1. Header Area -->
                <header class="px-6 pt-10 pb-4 flex flex-row items-center justify-between">
                    <div class="space-y-0.5">
                        <p class="text-[11px] font-bold text-slate-500 dark:text-slate-400 tracking-wide uppercase">Welcome,</p>
                        <h2 class="text-[22px] font-black tracking-tight text-slate-900 dark:text-white leading-none">Ibrahim Khalid!</h2>
                    </div>
                    <div class="relative group cursor-pointer">
                        <img src="https://ui-avatars.com/api/?name=Ibrahim+Khalid&background=0ea5e9&color=fff&rounded=true" alt="Profile Avatar" class="w-[42px] h-[42px] rounded-full object-cover outline outline-2 outline-offset-2 outline-transparent hover:outline-primary transition-all">
                        <div class="absolute top-0 right-0 w-3 h-3 bg-red-500 border-2 border-slate-50 dark:border-[#020617] rounded-full"></div>
                    </div>
                </header>

                <!-- 2. Stats Grid (3 columns) -->
                <div class="px-6 mt-4 flex items-center justify-between gap-3">
                    <div class="stat-card flex-1">
                        <p class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5">Progress</p>
                        <p class="text-xl font-black text-slate-900 dark:text-white tracking-tighter">60%</p>
                    </div>
                    <div class="stat-card flex-1">
                        <p class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5">Total Points</p>
                        <p class="text-xl font-black text-slate-900 dark:text-white tracking-tighter">240 <span class="text-[10px] font-bold text-slate-400 ml-0.5">pts</span></p>
                    </div>
                    <div class="stat-card flex-1">
                        <p class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5">Active Courses</p>
                        <p class="text-xl font-black text-slate-900 dark:text-white tracking-tighter">3</p>
                    </div>
                </div>

                <!-- 3. My Ongoing Learning Section -->
                <section class="mt-8 px-6 space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-[17px] font-black text-slate-900 dark:text-white">My Ongoing Learning</h3>
                        <a href="#" class="text-[10px] font-bold text-primary tracking-wide hover:underline underline-offset-2">View All</a>
                    </div>
                    
                    <!-- Dark Gradient Card (Always dark even in light mode as per image) -->
                    <div class="dark-ongoing-card rounded-[1.5rem] p-5 shadow-xl hover:shadow-2xl transition-shadow cursor-pointer">
                        <div class="flex items-start justify-between relative z-10 mb-4">
                            <!-- Left: Icon + Text -->
                            <div class="flex items-center gap-4">
                                <!-- Cyan Box Icon -->
                                <div class="w-[50px] h-[50px] rounded-2xl bg-teal-500/20 flex items-center justify-center border border-teal-500/30 shrink-0 shadow-inner">
                                    <!-- Simple Line Chart Icon mimicking the image -->
                                    <svg class="w-6 h-6 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                                </div>
                                <div class="space-y-0.5 mt-0.5">
                                    <h4 class="text-white font-bold text-[15px] leading-tight">Introduction to<br>Algebra</h4>
                                </div>
                            </div>
                            <!-- Right: 3 Dots Menu -->
                            <button class="text-white/40 hover:text-white transition-colors p-1">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                            </button>
                        </div>
                        
                        <!-- Progress Bar Area -->
                        <div class="mt-2 relative z-10 space-y-2">
                             <!-- Bar -->
                             <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                                 <div class="h-full bg-gradient-to-r from-teal-400 to-primary w-[60%] rounded-full shadow-glow"></div>
                             </div>
                             <!-- Labels -->
                             <div class="flex justify-between items-center text-[9px] font-bold text-slate-400 px-0.5 pt-1 uppercase tracking-widest">
                                 <span>Course Duration</span>
                                 <span class="text-white font-black">Days left</span>
                             </div>
                        </div>
                    </div>
                </section>

                <!-- 4. Recommended for You Section -->
                <section class="mt-8 px-6 space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-[17px] font-black text-slate-900 dark:text-white">Recommended for You</h3>
                        <a href="#" class="text-[10px] font-bold text-primary tracking-wide hover:underline underline-offset-2">View All</a>
                    </div>
                    
                    <!-- Light Interactive Card (Purple/Indigo tint) -->
                    <div class="bg-[#f0f5ff] dark:bg-[#151936] rounded-[1.5rem] p-5 flex justify-between relative overflow-hidden border border-indigo-100 dark:border-[#2a2d5c] cursor-pointer hover:shadow-lg transition-all h-[120px]">
                        <!-- Content -->
                        <div class="space-y-4 relative z-10 w-2/3 flex flex-col justify-center">
                            <h4 class="text-[19px] font-black text-slate-800 dark:text-white leading-[1.1] tracking-tight">English<br>Mastery</h4>
                            
                            <!-- Small overlay icons mimicking 3D stacked icons -->
                            <div class="flex items-center -space-x-1">
                                <div class="w-6 h-6 rounded-lg bg-indigo-200 dark:bg-indigo-900/50 border border-white dark:border-indigo-500/30 flex items-center justify-center transform -rotate-12 shadow-sm">
                                    <div class="w-3 h-0.5 bg-indigo-400 rounded-full"></div>
                                </div>
                                <div class="w-6 h-6 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center shadow-sm z-10">
                                    <svg class="w-3.5 h-3.5 text-primary" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L1 7l11 5-11 5-11-5 11-5zm0 15l11-5-11 5-11-5 11 5z"/></svg>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Floating Decorative element mimicking the right side graphics -->
                        <div class="absolute -right-4 -bottom-4 w-32 h-32 bg-indigo-200/50 dark:bg-[#2a2d5c]/50 blur-xl rounded-full"></div>
                        <div class="relative z-10 flex items-center justify-center w-16 opacity-80 mix-blend-multiply dark:mix-blend-screen text-indigo-400 dark:text-indigo-500 font-serif italic text-4xl mr-2">
                            Aa
                        </div>
                    </div>
                </section>

                <div class="px-6 mt-8 flex justify-center text-[10px] font-bold text-slate-400">
                    <p>End of Dashboard</p>
                </div>

            </div>

            <!-- --- BOTTOM FIXED NAVIGATION TAB BAR --- -->
            <nav class="bottom-nav-fixed shadow-[0_-10px_40px_rgba(0,0,0,0.03)] dark:shadow-[0_-10px_40px_rgba(0,0,0,0.4)]">
                
                <!-- Home (Active) -->
                <button class="nav-item active">
                    <svg class="w-[22px] h-[22px] mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l-7-3.82v-6L2 9l10-6z"/></svg>
                    <span>Home</span>
                </button>
                
                <!-- My Courses -->
                <button class="nav-item">
                    <svg class="w-[22px] h-[22px] mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    <span>My Courses</span>
                </button>
                
                <!-- Community -->
                <button class="nav-item">
                    <svg class="w-[22px] h-[22px] mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    <span>Community</span>
                </button>
                
                <!-- Profile -->
                <button class="nav-item">
                    <svg class="w-[22px] h-[22px] mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    <span>Profile</span>
                </button>
                
            </nav>

        </div>
    </div>

</body>
</html>
